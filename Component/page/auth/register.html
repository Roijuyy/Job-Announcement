<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Create Account</title>
    <link rel="stylesheet" href="../../../Assets/css/auth.css">
</head>

<body>
    <div class="full-page-center">
        <div class="row">
            <div class="col-3"></div>
            <div class="col-6">
                <div class="form-container">
                    <h2>Create Your Account</h2>

                    <div id="alertContainer" class="alert-container"></div>

                    <form id="registerForm" method="post" action="">
                        <div class="form-group">
                            <label for="fullname">Full Name</label>
                            <input type="text" id="fullname" name="fullname" autocomplete="name" placeholder="Your fullname" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" autocomplete="email" placeholder="someone@gmail.com" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" autocomplete="tel" placeholder="+855 12 345 678"
                                required>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" autocomplete="new-password" placeholder="********" minlength="8" required>
                            <span class="password-hint">Minimum 8 characters</span>
                        </div>

                        <div class="form-group">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" name="confirm-password" placeholder="********" autocomplete="new-password" required>
                        </div>

                        <div class="checkbox-group">
                            <input type="checkbox" id="terms" name="terms" required>
                            <label for="terms">I agree to the Terms and Conditions</label>
                        </div>

                        <button type="submit" class="btn-primary">Create Account</button>
                    </form>

                    <p class="form-footer">Already have an account? <a href="login.html">Login</a></p>
                </div>
            </div>
            <div class="col-3"></div>
        </div>
    </div>

    <script src="../../../Assets/js/auth/register.js"></script>
</body>

</html>
