<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Authentication System</title>
    <link rel="stylesheet" href="../../../Assets/css/auth.css">
</head>

<body>
    <div class="full-page-center">
        <div class="row">
            <div class="col-3"></div>
            <div class="col-6">
                <div class="form-container">
                    <h2>Login to Your Account</h2>

                    <div id="alertContainer" class="alert-container"></div>

                    <form id="loginForm" method="post" action="">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" autocomplete="email" placeholder="someone@gmail.com" required>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" autocomplete="current-password" placeholder="********" required>
                            <span class="toggle-password" id="togglePassword">Show</span>
                        </div>

                        <div class="form-options">
                            <a href="forgot-password.html">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn-primary">Login</button>
                    </form>

                    <p class="form-footer">
                        Don't have an account? <a href="register.html">Sign up</a>
                    </p>
                </div>
            </div>
            <div class="col-3"></div>
        </div>
    </div>

    <script src="../../../Assets/js/auth/login.js"></script>
</body>

</html>
