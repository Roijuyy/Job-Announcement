<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../../../Assets/css/auth.css">
</head>

<body>
    <div class="full-page-center">
        <div class="row">
            <div class="col-3"></div>
            <div class="col-6">
                <div class="form-container">
                    <h2>Reset Your Password</h2>
                    <p class="form-description">
                        Enter your email address and we'll send you an OTP code to reset your password.
                    </p>

                    <div id="alertContainer" class="alert-container"></div>

                    <form id="forgotPasswordForm" method="post" action="">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" autocomplete="email" placeholder="someone@gmail.com" required>
                        </div>

                        <button type="submit" class="btn-primary">Send OTP Code</button>
                    </form>

                    <p class="form-footer">
                        Remember your password? <a href="login.html">Back to Login</a>
                    </p>
                </div>
            </div>
            <div class="col-3"></div>
        </div>
    </div>

    <script src="../../../Assets/js/auth/forgot-password.js"></script>
</body>

</html>
