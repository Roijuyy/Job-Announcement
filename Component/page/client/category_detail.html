<!DOCTYPE html>
<html lang="en" theme-mode="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../../Assets/css/style.css">
    <link rel="stylesheet" href="../../../Assets/css/client/job.css">
    <link rel="stylesheet" href="../../../Assets/css/client/privacy.css">
</head>
<body>
    <!-- Header -->
    <header class="header"></header>

    <!-- Main Content -->
    <main class="main-content">
        <header class="text-center my-4" id="category_header">
            <!-- Header Detail -->
        </header>
        
        <div class="flex-between">
            <h3>Filter By</h3>
            <div class="card">
                <select name="filter" class="filter" id="job-filter" style="background: transparent; border: none; outline: none;font-size: 0.95rem; font-weight: 600; cursor: pointer;">
                    <option value="general">General</option>
                    <option value="fulltime">Full-Time</option>
                    <option value="parttime">Part-Time</option>
                    <option value="remote">Remote</option>
                    <option value="freelance">Freelance</option>
                    <option value="contract">Contract</option>
                </select>
            </div>
        </div>

        <!-- All Jobs Grid -->
        <section class="job-grid py-4" id="category">

            <!--Jobs Informations -->

        </section>
    </main>

    <!-- Footer -->
    <footer class="footer-content"></footer>

    <!-- Load Header/Navigation and Footer -->
    <script src="../../layout/client_layout.js"></script>
    <script src="../../../Assets/js/mode.js"></script>

    <!-- Load Catagory detail -->
    <script src="../../../Assets/js/category_detail.js"></script>

</body>
</html>
